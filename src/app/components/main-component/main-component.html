<h1>Mission Control Center</h1>
<div class="container flex flex-col gap-4">
    @for (h of heroes; track h.id) {
    <app-hero-card-component [hero]="h" (missionComplete)="onMissionComplete($event)"></app-hero-card-component>
    } @empty {
    <p>No heroes available.</p>
    }
</div>
<p>Missioni completate: {{ totalCompleted }}</p>
