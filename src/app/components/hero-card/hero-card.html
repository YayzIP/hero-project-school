<div
    [class]="hero.missionCompleted ? 'bg-green-100 p-4 border rounded-lg shadow-md' : 'bg-white p-4 border rounded-lg shadow-md'">
    <h3 class="text-xl font-bold mb-2">{{ hero.name }}</h3>
    <p class="text-gray-700 mb-4">Super Power: {{ hero.superPower }}</p>
    <button (click)="completeMission()" [disabled]="hero.missionCompleted"
        class="bg-blue-500 hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed text-white font-bold py-2 px-4 rounded">
        Mission Complete
    </button>
    <button (click)="selectHero()"
        class="bg-emerald-500 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded ml-2">
        Select Hero
    </button>
</div>
